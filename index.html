<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS propio -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark app-navbar">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">ITPM ADMINISTRACION DE CUENTAS</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
            Usuario
          </a>
          <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
            <li><a class="dropdown-item" href="#">Perfil</a></li>
            <li><a class="dropdown-item" href="#">Notificaciones</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#">Cerrar sesión</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- GRID SYSTEM -->
<div class="container-fluid app-main-wrapper">
  <div class="row g-0">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="col-md-3 col-lg-2 p-4">
      <h3 class="sidebar-title">HERRAMIENTAS</h3>
      <ul class="nav flex-column sidebar-links">
        <li class="nav-item"><a class="nav-link active" href="#">INICIO</a></li>
        <li class="nav-item"><a class="nav-link" href="#">USUARIOS</a></li>
        <li class="nav-item"><a class="nav-link" href="#">SOPORTE</a></li>
        <li class="nav-item"><a class="nav-link" href="#">CONTACTO</a></li>
      </ul>
    </aside>

    <!-- CONTENIDO -->
    <main class="col-md-9 col-lg-10 d-flex align-items-center content-area p-4 p-lg-5">
      <div class="container-fluid">
        <div class="row justify-content-center align-items-center">
          <div class="col-12 col-md-10 col-lg-6">
            <section class="register-card">
              <form class="row g-3">
                <div class="col-12">
                  <h2>Registro de Usuarios</h2>
                </div>

                <div class="col-12">
                  <!-- FORMULARIO -->
                  <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre completo</label>
                    <input id="nombre" type="text" class="form-control is-valid" value="Ana Vargas" required>
                    <div class="valid-feedback">Nombre valido.</div>
                  </div>

                  <div class="mb-3">
                    <label for="correo" class="form-label">Correo corporativo</label>
                    <input id="correo" type="email" class="form-control is-valid" value="ana.vargas@empresa.com" required>
                    <div class="valid-feedback">Correo verificado.</div>
                  </div>

                  <div class="mb-0">
                    <label for="password" class="form-label">Contraseña</label>
                    <input id="password" type="password" class="form-control" placeholder="Minimo 8 caracteres">
                  </div>
                </div>

                <div class="col-12">
                  <!-- BOTONES -->
                  <div class="d-flex flex-wrap gap-2">
                    <button type="submit" class="btn btn-primary">Ingresar</button>
                    <button type="button" class="btn btn-danger" disabled>Cancelar</button>
                  </div>
                </div>
              </form>
            </section>
          </div>
        </div>
      </div>
    </main>

  </div>
</div>

<footer class="footer-elegant">
  <div class="container-fluid">
    <div class="row">
      <div class="col-12 text-center py-3">
        <small>ITPM2026 r1d3rvAdmin. Control y seguridad para tu pagina web</small>
      </div>
    </div>
  </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
